services:
  # pipeline1 requires ~12GB RAM; run directly on the host instead:
  #   bash data/pipelines/pipeline1_initial/run_pipeline.sh
  # pipeline1:
  #   build: pipelines/pipeline1_initial/
  #   container_name: smartqueue-pipeline1
  #   environment:
  #     - OUTPUT_DIR=/app/data
  #     - SOURCE=/xite/xite_msd.parquet
  #   volumes:
  #     - ./raw:/app/data/raw
  #     - ./processed:/app/data/processed
  #     - ../XITE-Million-Sessions-Dataset:/xite

  generator:
    build: pipelines/generator/
    container_name: smartqueue-generator
    command: python generator.py
    environment:
      - DATA_DIR=/app/data
      - QUEUE_ENDPOINT=${QUEUE_ENDPOINT:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-ObjStore_proj13}
      - LOCAL_MODE=${LOCAL_MODE:-true}
      - CONCURRENCY=${CONCURRENCY:-10}
      - FEEDBACK_DELAY=${FEEDBACK_DELAY:-1.0}
    volumes:
      - ./processed:/app/data/processed
      - ./feedback:/app/data/feedback
