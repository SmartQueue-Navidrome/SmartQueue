version: "3.9"

services:
  fastapi_lgbm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lightgbm
    container_name: fastapi_lgbm
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_DIR:-../model_artifacts}:/models:ro
    environment:
      # Priority 1: local file (fastest)
      - LOCAL_MODEL_PATH=/models/smartqueue_lgbm.txt
      - SMARTQUEUE_MODEL_PATHS=/models/ranking_model_latest.pkl
      - MODEL_VERSION=${MODEL_VERSION:-lightgbm_v4}
      # Priority 2: MLflow (set MLFLOW_TRACKING_URI + S3 creds when no local model)
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://129.114.24.226:30500}
      - MODEL_URI=${MODEL_URI:-runs:/2ce32ba692c54095b4307ae8eb7ba508/model}
      - MODEL_NAME=${MODEL_NAME:-smartqueue-ranking}
      - MODEL_STAGE=${MODEL_STAGE:-Production}
      - MOCK_ON_MLFLOW_FAIL=${MOCK_ON_MLFLOW_FAIL:-false}
      - UVICORN_PORT=8000
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - fastapi_lgbm
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../workspace:/home/jovyan/work
      - ../models:/home/jovyan/work/models
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped

  monitor:
    profiles: ["monitor"]
    image: python:3.11-slim
    container_name: smartqueue_monitor
    working_dir: /app
    volumes:
      - ../monitoring:/app
      - monitor_logs:/logs
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - SERVING_URL=http://fastapi_lgbm:8000
      - ROLLBACK_LOG=/logs/rollback.jsonl
    depends_on:
      - prometheus
      - fastapi_lgbm
    command: >
      sh -c "pip install -q -r requirements.txt && 
             python promotion_triggers.py monitor --interval 60"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  monitor_logs:
