version: "3.9"

services:
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - ../model_artifacts:/app/model_artifacts:ro
    environment:
      - MODEL_PATH=${MODEL_PATH:-/app/model_artifacts/smartqueue_ranker.onnx}
      - MODEL_VERSION=${MODEL_VERSION:-1.0.0}
      - UVICORN_PORT=8000
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    restart: unless-stopped

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../workspace:/home/jovyan/work
      - ../models:/home/jovyan/work/models
      - ../model_artifacts:/home/jovyan/work/model_artifacts
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped

  eval:
    profiles: ["eval"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.eval
    working_dir: /eval
    depends_on:
      - fastapi
    volumes:
      - ../evaluation:/eval
      - ../../shared:/shared:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST=http://fastapi:8000
      - SHARED_DIR=/shared
      - CAPTURE_CONTAINER=fastapi
      - MODEL_PATH_USED=${MODEL_PATH:-/app/model_artifacts/smartqueue_ranker.onnx}
      - MODEL_VERSION_USED=${MODEL_VERSION:-1.0.0}
      - UVICORN_WORKERS_USED=${UVICORN_WORKERS:-1}
      - TYPICAL_USERS=${TYPICAL_USERS:-10}
      - TYPICAL_SPAWN_RATE=${TYPICAL_SPAWN_RATE:-2}
      - TYPICAL_RUNTIME=${TYPICAL_RUNTIME:-5m}
      - PEAK_USERS=${PEAK_USERS:-30}
      - PEAK_SPAWN_RATE=${PEAK_SPAWN_RATE:-5}
      - PEAK_RUNTIME=${PEAK_RUNTIME:-5m}
      - CAPTURE_INTERVAL=${CAPTURE_INTERVAL:-5}
    command: ["sleep", "infinity"]
