services:
  fastapi_lgbm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lightgbm
    container_name: fastapi_lgbm
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_DIR:-../model_artifacts}:/models:ro
    environment:
      # Priority 1: local file under MODEL_DIR mount (fastest, no network)
      - LOCAL_MODEL_PATH=/models/smartqueue_lgbm.txt
      - SMARTQUEUE_MODEL_PATHS=/models/ranking_model_latest.pkl
      - MODEL_VERSION=${MODEL_VERSION:-lightgbm_v4}
      # Priority 2: MLflow — set MLFLOW_TRACKING_URI to enable (required when no local model)
      # External (from VM):  MLFLOW_TRACKING_URI=http://129.114.24.226:30500
      # In-cluster:          MLFLOW_TRACKING_URI=http://mlflow.smartqueue-platform.svc.cluster.local:5000
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://129.114.24.226:30500}
      - MODEL_URI=${MODEL_URI:-runs:/2ce32ba692c54095b4307ae8eb7ba508/model}
      - MODEL_NAME=${MODEL_NAME:-smartqueue-ranking}
      - MODEL_STAGE=${MODEL_STAGE:-Production}
      # S3 credentials for MLflow artifact download (Chameleon object storage)
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL:-https://chi.tacc.chameleoncloud.org:7480}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # Fall back to mock if MLflow artifact download fails (prevents crash-loop during startup)
      - MOCK_ON_MLFLOW_FAIL=${MOCK_ON_MLFLOW_FAIL:-false}
      - UVICORN_PORT=8000
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    restart: unless-stopped

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../workspace:/home/jovyan/work
      - ../models:/home/jovyan/work/models
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped

  eval:
    profiles: ["eval"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.eval
    working_dir: /eval
    depends_on:
      - fastapi_lgbm
    volumes:
      - ../evaluation:/eval
      - ../../shared:/shared:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST=http://fastapi_lgbm:8000
      - SHARED_DIR=/shared
      - CAPTURE_CONTAINER=fastapi_lgbm
      - MODEL_PATH_USED=${LOCAL_MODEL_PATH:-/models/smartqueue_lgbm.txt}
      - MODEL_VERSION_USED=${MODEL_VERSION:-lightgbm_v4}
      - UVICORN_WORKERS_USED=${UVICORN_WORKERS:-1}
      - TYPICAL_USERS=${TYPICAL_USERS:-10}
      - TYPICAL_SPAWN_RATE=${TYPICAL_SPAWN_RATE:-2}
      - TYPICAL_RUNTIME=${TYPICAL_RUNTIME:-5m}
      - PEAK_USERS=${PEAK_USERS:-30}
      - PEAK_SPAWN_RATE=${PEAK_SPAWN_RATE:-5}
      - PEAK_RUNTIME=${PEAK_RUNTIME:-5m}
      - CAPTURE_INTERVAL=${CAPTURE_INTERVAL:-5}
    command: ["sleep", "infinity"]
