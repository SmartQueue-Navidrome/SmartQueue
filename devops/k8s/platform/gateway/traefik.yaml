apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: smartqueue-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-gateway
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes", "referencegrants", "tcproutes", "tlsroutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses/status", "gateways/status", "httproutes/status"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-gateway
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: smartqueue-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: smartqueue-platform
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v3.1
          args:
            - --providers.kubernetesgateway
            - --entrypoints.web.address=:80
            - --api.insecure=true
          ports:
            - containerPort: 80
              name: web
            - containerPort: 8080
              name: dashboard
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: smartqueue-platform
  labels:
    app: traefik
spec:
  type: NodePort
  selector:
    app: traefik
  ports:
    - name: web
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: dashboard
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30088
