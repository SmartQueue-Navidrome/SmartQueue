apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smartqueue-prod

resources:
  - ../../base
  - hpa.yaml

patches:
  - target:
      kind: Deployment
      name: smartqueue-serving
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Service
      name: smartqueue-serving
    patch: |-
      - op: add
        path: /spec/ports/0/nodePort
        value: 30800
