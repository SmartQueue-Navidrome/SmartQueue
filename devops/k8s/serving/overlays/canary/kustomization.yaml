apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smartqueue-canary

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: smartqueue-serving
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Service
      name: smartqueue-serving
    patch: |-
      - op: add
        path: /spec/ports/0/nodePort
        value: 30802
