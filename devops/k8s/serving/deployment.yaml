# K8S Deployment equivalent for serving container
# Dockerfile: serving/docker/Dockerfile.fastapi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartqueue-serving
  namespace: smartqueue-prod
  labels:
    app: smartqueue-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartqueue-serving
  template:
    metadata:
      labels:
        app: smartqueue-serving
    spec:
      containers:
        - name: serving
          image: node1:5000/smartqueue-serving:v1
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
