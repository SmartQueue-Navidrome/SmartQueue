apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartqueue-serving
  labels:
    app: smartqueue-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartqueue-serving
  template:
    metadata:
      labels:
        app: smartqueue-serving
    spec:
      containers:
        - name: serving
          image: node1:5000/smartqueue-serving:v1
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.smartqueue-platform.svc.cluster.local:5000
            - name: MODEL_URI
              value: runs:/PLACEHOLDER/model
            - name: MODEL_VERSION
              value: v0
            - name: MLFLOW_S3_ENDPOINT_URL
              value: https://chi.tacc.chameleoncloud.org:7480
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
