apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartqueue-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: node-alerts
      rules:
        - alert: NodeHighCPU
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU > 85%"
            description: "CPU usage is {{ $value }}% for 5+ minutes"
        - alert: NodeHighMemory
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory > 85%"
            description: "Memory usage is {{ $value }}% for 5+ minutes"
    - name: pod-alerts
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash looping"
            description: "{{ $value }} restarts in last 10 minutes"
        - alert: PVCNearFull
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} > 80% full"
    - name: disk-alerts
      rules:
        - alert: NodeDiskPressure
          expr: 100 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"} * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} root disk > 80%"
            description: "Disk usage is {{ $value }}%. Clean docker build cache to prevent evictions."
    - name: serving-alerts
      rules:
        - alert: ServingDown
          expr: up{job="smartqueue-serving"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Serving endpoint down"
        - alert: HPAMaxedOut
          expr: kube_horizontalpodautoscaler_status_current_replicas == kube_horizontalpodautoscaler_spec_max_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
            description: "Running at {{ $value }} replicas (max) for 10+ minutes"
