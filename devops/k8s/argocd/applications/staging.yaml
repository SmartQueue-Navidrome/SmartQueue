apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartqueue-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SmartQueue-Navidrome/SmartQueue.git
    targetRevision: main
    path: devops/k8s/serving/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: smartqueue-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
