apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartqueue-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yanghao13111/SmartQueue.git
    targetRevision: main
    path: devops/k8s/serving/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: smartqueue-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
