apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartqueue-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SmartQueue-Navidrome/SmartQueue.git
    targetRevision: main
    path: devops/k8s/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: smartqueue-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
