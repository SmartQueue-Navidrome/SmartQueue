apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: deploy-to-env
  namespace: argo
spec:
  entrypoint: deploy
  arguments:
    parameters:
      - name: app-name
      - name: model-uri
      - name: model-version
  templates:
    - name: deploy
      inputs:
        parameters:
          - name: app-name
          - name: model-uri
          - name: model-version
      steps:
        - - name: argocd-sync
            template: argocd-sync
            arguments:
              parameters:
                - name: app-name
                  value: "{{inputs.parameters.app-name}}"
        - - name: update-model-env
            template: update-model-env
            arguments:
              parameters:
                - name: app-name
                  value: "{{inputs.parameters.app-name}}"
                - name: model-uri
                  value: "{{inputs.parameters.model-uri}}"
                - name: model-version
                  value: "{{inputs.parameters.model-version}}"
        - - name: audit-log
            template: audit-log
            arguments:
              parameters:
                - name: app-name
                  value: "{{inputs.parameters.app-name}}"
                - name: model-version
                  value: "{{inputs.parameters.model-version}}"
                - name: action
                  value: "DEPLOY"

    - name: argocd-sync
      inputs:
        parameters:
          - name: app-name
      container:
        image: quay.io/argoproj/argocd:v2.12.0
        command: [sh, -c]
        args:
          - |
            set -e
            argocd login argocd-server.argocd.svc.cluster.local \
              --username admin \
              --password "$ARGOCD_PASSWORD" \
              --insecure --plaintext

            argocd app sync {{inputs.parameters.app-name}} --force
            argocd app wait {{inputs.parameters.app-name}} --timeout 120
        env:
          - name: ARGOCD_PASSWORD
            valueFrom:
              secretKeyRef:
                name: argocd-initial-admin-secret
                key: password

    - name: update-model-env
      inputs:
        parameters:
          - name: app-name
          - name: model-uri
          - name: model-version
      script:
        image: quay.io/argoproj/argocd:v2.12.0
        command: [bash]
        source: |
          set -e
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq curl > /dev/null 2>&1
          curl -sLO "https://dl.k8s.io/release/v1.30.6/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/

          case "{{inputs.parameters.app-name}}" in
            smartqueue-prod)    NS="smartqueue-prod" ;;
            smartqueue-staging) NS="smartqueue-staging" ;;
            smartqueue-canary)  NS="smartqueue-canary" ;;
            *)                  NS="smartqueue-prod" ;;
          esac

          kubectl set env deployment/smartqueue-serving -n "$NS" \
            MODEL_URI={{inputs.parameters.model-uri}} \
            MODEL_VERSION={{inputs.parameters.model-version}}

          kubectl rollout status deployment/smartqueue-serving -n "$NS" --timeout=120s
          echo "Deployed model {{inputs.parameters.model-version}} to $NS"

    - name: audit-log
      inputs:
        parameters:
          - name: app-name
          - name: model-version
          - name: action
      script:
        image: quay.io/argoproj/argocd:v2.12.0
        command: [bash]
        source: |
          set -e
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq curl > /dev/null 2>&1
          curl -sLO "https://dl.k8s.io/release/v1.30.6/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          case "{{inputs.parameters.app-name}}" in
            smartqueue-prod)    NS="smartqueue-prod" ;;
            smartqueue-staging) NS="smartqueue-staging" ;;
            smartqueue-canary)  NS="smartqueue-canary" ;;
            *)                  NS="smartqueue-prod" ;;
          esac
          ENV=$(echo $NS | sed 's/smartqueue-//')

          ENTRY="$TIMESTAMP | {{inputs.parameters.action}} | $ENV | {{inputs.parameters.model-version}} | triggered by ct-pipeline"

          EXISTING=$(kubectl get configmap model-audit-log -n smartqueue-prod \
            -o jsonpath='{.data.log}' 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            kubectl create configmap model-audit-log -n smartqueue-prod \
              --from-literal=log="$ENTRY" --dry-run=client -o yaml | kubectl apply -f -
          else
            NEW_LOG=$(printf '%s\n%s' "$EXISTING" "$ENTRY")
            kubectl create configmap model-audit-log -n smartqueue-prod \
              --from-literal=log="$NEW_LOG" --dry-run=client -o yaml | kubectl apply -f -
          fi
          echo "Audit logged: $ENTRY"
