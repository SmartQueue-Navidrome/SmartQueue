---
# Post-Kubernetes setup
# Run after Kubespray cluster.yml completes

- name: Post-K8S configuration
  hosts: control_plane
  become: true
  tasks:

    - name: Copy kubeconfig to cc user
      shell: |
        cp -R /root/.kube /home/cc/.kube
        chown -R cc:cc /home/cc/.kube
      args:
        creates: /home/cc/.kube/config

    # NAT setup moved to setup_nat.yaml (runs BEFORE kubespray).
    # post_k8s.yaml no longer manages NAT — see setup_nat.yaml.

- name: Install Docker CLI and registry
  hosts: control_plane
  become: true
  tasks:

    - name: Add Docker apt repo
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
        apt-get -qq update
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - docker-buildx-plugin
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Configure Docker daemon (insecure registry)
      copy:
        content: |
          {
            "insecure-registries": ["node1:5000", "192.168.1.11:5000"]
          }
        dest: /etc/docker/daemon.json

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Check if registry container exists
      shell: docker ps -a --format '{%raw%}{{.Names}}{%endraw%}' | grep -q '^registry$'
      register: registry_exists
      failed_when: false
      changed_when: false

    - name: Run Docker registry container
      shell: docker run -d --name registry --restart=always -p 5000:5000 registry:2
      when: registry_exists.rc != 0

    - name: Ensure registry container is running
      shell: docker start registry
      when: registry_exists.rc == 0
      changed_when: false

- name: Install Helm
  hosts: control_plane
  become: true
  tasks:

    - name: Install Helm
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

- name: Apply K8S resources
  hosts: control_plane
  become: false
  tasks:

    - name: Copy K8S manifests to node1
      copy:
        src: "{{ playbook_dir }}/../../k8s/"
        dest: /home/cc/k8s/
        owner: cc
        group: cc

    - name: Copy workflows to node1
      copy:
        src: "{{ playbook_dir }}/../../workflows/"
        dest: /home/cc/workflows/
        owner: cc
        group: cc

    - name: Create namespaces
      command: kubectl apply -f /home/cc/k8s/namespaces.yaml

    - name: Create PersistentVolumes
      command: kubectl apply -f /home/cc/k8s/storage/persistent-volumes.yaml

    - name: Install Gateway API CRDs
      command: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

- name: Install ArgoCD
  hosts: control_plane
  become: false
  tasks:

    - name: Add ArgoCD Helm repo
      command: helm repo add argo https://argoproj.github.io/argo-helm

    - name: Update Helm repos
      command: helm repo update

    - name: Install ArgoCD
      command: >
        helm upgrade --install argocd argo/argo-cd
        --namespace argocd
        --create-namespace
        --set server.service.type=NodePort
        --set server.service.nodePort=30443
        --set server.extraArgs[0]=--insecure
        --timeout 300s
        --wait

    - name: Wait for ArgoCD server
      command: kubectl rollout status deployment argocd-server -n argocd --timeout=120s

    - name: Apply ArgoCD applications
      command: kubectl apply -f /home/cc/k8s/argocd/applications/

- name: Install Argo Workflows
  hosts: control_plane
  become: false
  tasks:

    - name: Install Argo Workflows
      command: >
        helm upgrade --install argo-workflows argo/argo-workflows
        --namespace argo
        --create-namespace
        --set server.service.type=NodePort
        --set server.service.nodePort=30446
        --set server.auth.mode=server
        --timeout 300s
        --wait

    - name: Create Argo Workflow ServiceAccount
      shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: argo-workflow-sa
          namespace: argo
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: argo-workflow-role
        rules:
          - apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "get", "list", "watch", "delete"]
          - apiGroups: [""]
            resources: ["pods", "pods/log", "secrets", "services"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "list", "create", "update", "patch"]
          - apiGroups: ["argoproj.io"]
            resources: ["workflows", "workflowtemplates", "cronworkflows", "workflowtaskresults"]
            verbs: ["*"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: argo-workflow-binding
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: argo-workflow-role
        subjects:
          - kind: ServiceAccount
            name: argo-workflow-sa
            namespace: argo
        EOF

    - name: Apply WorkflowTemplates
      command: kubectl apply -f /home/cc/workflows/

    # NOTE: s3-secret copy to argo namespace is done by deploy.sh
    # AFTER secrets are created (Phase 7). It cannot run here because
    # secrets don't exist yet at this point in the deployment flow.
